services:
  db:
    image: pgvector/pgvector:pg17
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: freestyle
      POSTGRES_USER: freestyle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freestyle}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freestyle"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
